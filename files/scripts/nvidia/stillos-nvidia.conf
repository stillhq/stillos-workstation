# DRM KMS and fbdev are defaults in the current driver; keep them explicit so
# Wayland and PRIME behavior remain stable across driver updates.
options nvidia_drm modeset=1 fbdev=1

# Fine-grained runtime D3 power management lets a supported laptop dGPU sleep
# when no offloaded application is using it. Unsupported desktop GPUs ignore it.
options nvidia NVreg_DynamicPowerManagement=0x02
