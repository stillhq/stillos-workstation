# ba0fde3d-bee7-4307-b97b-17d0d20aff50
[customizations.installer.kickstart]
contents = """
%pre
echo "GSK_RENDERER=ngl" >> /etc/environment
%end

zerombr
clearpart --none --initlabel
reqpart --add-boot
part swap --recommended
part / --fstype=ext4 --size=1024 --grow
timezone America/Los_Angeles --utc
network --hostname stillos --bootproto=dhcp --device=link --activate --onboot=on
rootpw --lock

%addon com_redhat_kdump --disable end
%end

%post --erroronfail --log=/root/anaconda-post.log
bootc switch --mutate-in-place --transport registry quay.io/stillhq/stillos-workstation:latest

rm -f /var/lib/systemd/random-seed
systemctl disable kdump.service

%end
"""

[customizations.installer.modules]
enable = [
    "org.fedoraproject.Anaconda.Modules.Localization",
    "org.fedoraproject.Anaconda.Modules.Storage",
    "org.fedoraproject.Anaconda.Modules.Timezone"
]
disable = [
    "org.fedoraproject.Anaconda.Modules.Network",
    "org.fedoraproject.Anaconda.Modules.Security",
    "org.fedoraproject.Anaconda.Modules.Services",
    "org.fedoraproject.Anaconda.Modules.Subscription",
    "org.fedoraproject.Anaconda.Modules.Users",
]
